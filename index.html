<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meeting Scheduler</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; color: #111; background: #f5f5f2; padding: 0.75rem; font-size: 16px; }
.wrap { max-width: 680px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
p { font-size: 14px; color: #555; line-height: 1.5; }
.card { background: #fff; border: 1px solid #e5e5e0; border-radius: 14px; padding: 1rem; margin-bottom: 0.75rem; }
input[type=text], input[type=email], input[type=date], input[type=password] {
  width: 100%; padding: 11px 12px; border: 1px solid #ddd; border-radius: 10px;
  font-size: 16px; font-family: inherit; background: #fff; color: #111; outline: none;
  -webkit-appearance: none; appearance: none;
}
input:focus { border-color: #555; box-shadow: 0 0 0 3px rgba(0,0,0,0.07); }
button {
  padding: 11px 18px; border: 1px solid #ccc; border-radius: 10px; background: #fff;
  color: #111; font-size: 15px; font-family: inherit; cursor: pointer;
  transition: background 0.12s; -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
button:active { background: #ececea; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.primary { background: #111; color: #fff; border-color: transparent; }
button.primary:active { background: #333; }
button.danger { color: #c0392b; border-color: #e8c8c6; font-size: 13px; padding: 8px 12px; min-height: 36px; }
button.sm { font-size: 13px; padding: 7px 12px; min-height: 36px; }
.label { font-size: 12px; color: #777; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 999px; background: #e8f4fe; color: #1a6fa8; font-weight: 600; }
.badge-green { background: #e6f9f3; color: #0a7a54; }
.row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.inv-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.inv-row input { flex: 1; min-width: 120px; }

.avail-grid { display: flex; flex-direction: column; gap: 10px; }
.date-block { border: 1px solid #e5e5e0; border-radius: 10px; overflow: hidden; }
.date-header { background: #f5f5f2; padding: 8px 12px; font-size: 13px; font-weight: 600; color: #444; border-bottom: 1px solid #e5e5e0; }
.time-slots { display: flex; flex-direction: column; }
.time-slot-row { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid #f0f0ec; gap: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
.time-slot-row:last-child { border-bottom: none; }
.time-slot-row:active { background: #f8f8f5; }
.time-slot-row.checked { background: #f0faf6; }
.slot-label { flex: 1; font-size: 14px; color: #333; }
.slot-check { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; transition: all 0.1s; }
.slot-check.checked { background: #1D9E75; border-color: #1D9E75; color: #fff; }

.results-grid { display: flex; flex-direction: column; gap: 10px; }
.result-date-block { border: 1px solid #e5e5e0; border-radius: 10px; overflow: hidden; }
.result-date-header { padding: 8px 12px; font-size: 13px; font-weight: 600; background: #f5f5f2; border-bottom: 1px solid #e5e5e0; }
.result-slot-row { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid #f0f0ec; gap: 10px; }
.result-slot-row:last-child { border-bottom: none; }
.result-slot-row.best { background: #f0faf6; }
.result-slot-label { flex: 1; font-size: 14px; }
.result-slot-count { font-size: 13px; font-weight: 600; color: #444; min-width: 36px; text-align: right; }
.result-bar-wrap { flex: 2; }
.result-bar { height: 6px; border-radius: 3px; background: #eee; overflow: hidden; }
.result-bar-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.3s; }
.best-tag { font-size: 10px; font-weight: 700; background: #1D9E75; color: #fff; padding: 1px 6px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }

.person-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0ec; }
.person-row:last-child { border-bottom: none; }
.avatar { width: 34px; height: 34px; border-radius: 50%; background: #e8f0fe; color: #3c5fce; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.person-info { flex: 1; }
.person-name { font-size: 14px; font-weight: 600; }
.person-email { font-size: 12px; color: #888; }
.person-slots { font-size: 12px; color: #1D9E75; font-weight: 600; }

.add-inv-panel { background: #f8f8f5; border-radius: 10px; padding: 12px; margin-top: 10px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #111; color: #fff; padding: 12px 22px; border-radius: 10px;
  font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
.spinner {
  display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor;
  border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { color: #c0392b; font-size: 13px; margin-bottom: 12px; padding: 10px 14px; background: #fdf2f2; border-radius: 8px; border: 1px solid #e8c8c6; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 8px; }
.full-btn { width: 100%; margin-top: 4px; }
.divider { height: 1px; background: #f0f0ec; margin: 10px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="toast" id="toast" aria-live="polite"></div>
  <div id="app"><p style="padding:2rem;text-align:center">Loading...</p></div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxECIgNr7WSyIyD0WyUAA3tEb9VSLlxL-aJXRlQlFRcObO0oaXMetwCupHuRSjBDVEz/exec';

var DEFAULT_TIMES = ['Morning (10am-12pm)', 'Afternoon (2pm-4pm)'];

var S = {
  view: 'login',
  loading: false,
  poll: null,
  results: null,
  inviteeToken: null,
  newPoll: {
    title: '',
    description: '',
    dates: [],
    times: DEFAULT_TIMES.slice(),
    invitees: [{ name: '', email: '' }]
  },
  newDateInput: '',
  respondName: '',
  respondEmail: '',
  pw: '',
  sessionToken: null,
  selections: {},
  error: null,
  showAddInvitees: false,
  newInvitees: [{ name: '', email: '' }]
};

function resetNewPoll() {
  return {
    title: '',
    description: '',
    dates: [],
    times: DEFAULT_TIMES.slice(),
    invitees: [{ name: '', email: '' }]
  };
}

function set(patch) {
  Object.assign(S, patch);
  render();
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeEmail(email) {
  return String(email || '').trim().toLowerCase();
}

function isValidEmail(email) {
  var e = normalizeEmail(email);
  return !!e && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

function uniqueStrings(arr) {
  var seen = new Set();
  return arr.filter(function(v) {
    var key = String(v || '').trim();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function dedupeInvitees(invitees) {
  var seen = new Set();
  var out = [];
  invitees.forEach(function(inv) {
    var email = normalizeEmail(inv.email);
    if (!email || seen.has(email)) return;
    seen.add(email);
    out.push({
      name: String(inv.name || '').trim(),
      email: email
    });
  });
  return out;
}

async function apiGet(params) {
  var url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  var res = await fetch(url, {
    method: 'GET',
    credentials: 'omit'
  });
  if (!res.ok) throw new Error('Request failed (' + res.status + ')');
  return res.json();
}

async function apiPost(body) {
  var res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
    credentials: 'omit'
  });
  if (!res.ok) throw new Error('Request failed (' + res.status + ')');
  return res.json();
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function fmtDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function fmtDateLong(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function initials(name) {
  var n = String(name || '').trim();
  if (!n) return '?';
  var parts = n.split(/\s+/);
  var first = parts[0] ? parts[0][0] : '';
  var second = parts[1] ? parts[1][0] : '';
  return (first + second).toUpperCase() || '?';
}

function avatarColor(name) {
  var colors = ['#e8f0fe:#3c5fce', '#fce8e6:#c0392b', '#e6f4ea:#1D9E75', '#fff3e0:#e67e22', '#f3e5f5:#8e44ad'];
  var n = String(name || '');
  var ch = n.length ? n.charCodeAt(0) : 0;
  var i = ch % colors.length;
  return colors[i].split(':');
}

function render() {
  var app = document.getElementById('app');

  if (S.view === 'login') app.innerHTML = loginView();
  else if (S.view === 'host') app.innerHTML = hostView();
  else if (S.view === 'results') app.innerHTML = resultsView();
  else if (S.view === 'respond') app.innerHTML = respondView();
  else if (S.view === 'submitted') app.innerHTML = submittedView();

  document.querySelectorAll('[data-a]').forEach(function(el) {
    if (el.tagName === 'INPUT') {
      el.addEventListener('blur', handle);
      if (el.type === 'date') el.addEventListener('change', handle);
    } else {
      el.addEventListener('click', handle);
    }
  });
}

function loginView() {
  return ''
    + '<div style="padding-top:3rem;text-align:center;max-width:320px;margin:0 auto">'
    +   '<h1 style="margin-bottom:8px">Host login</h1>'
    +   '<p style="margin-bottom:1.5rem">Enter your password to create or manage polls.</p>'
    +   '<input type="password" id="pw-input" placeholder="Password" data-a="set-pw" value="' + esc(S.pw) + '" style="margin-bottom:10px;text-align:center"/>'
    +   (S.error ? '<div class="error-box" style="margin-bottom:10px">' + esc(S.error) + '</div>' : '')
    +   '<button class="primary full-btn" data-a="login"' + (S.loading ? ' disabled' : '') + '>'
    +     (S.loading ? '<span class="spinner"></span>Signing in...' : 'Enter &rarr;')
    +   '</button>'
    + '</div>';
}

function hostView() {
  var p = S.newPoll;
  var validInvitees = dedupeInvitees(p.invitees).filter(function(i) { return isValidEmail(i.email); });
  var canCreate = p.title.trim() && p.dates.length > 0 && validInvitees.length > 0;

  var datesHtml = p.dates.length > 0
    ? '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">'
      + p.dates.map(function(d, i) {
          return '<span style="display:inline-flex;align-items:center;gap:6px;background:#f0f0ec;border-radius:999px;padding:5px 10px 5px 12px;font-size:13px">'
            + esc(fmtDate(d))
            + '<button class="danger" data-a="rm-date" data-i="' + i + '" style="border:none;background:none;padding:0;min-height:auto;font-size:15px;color:#888;cursor:pointer">×</button></span>';
        }).join('')
      + '</div>'
    : '';

  var invHtml = p.invitees.map(function(inv, i) {
    return '<div class="inv-row">'
      + '<input type="text" placeholder="Name" value="' + esc(inv.name) + '" data-a="inv-name" data-i="' + i + '"/>'
      + '<input type="email" placeholder="Email" value="' + esc(inv.email) + '" data-a="inv-email" data-i="' + i + '"/>'
      + (p.invitees.length > 1 ? '<button class="danger" data-a="rm-inv" data-i="' + i + '">×</button>' : '')
      + '</div>';
  }).join('');

  return ''
    + '<div style="text-align:center;padding:0.75rem 0 0.5rem"><img src="CaptainLarry.jpg" alt="Logo" style="max-height:70px;max-width:180px;object-fit:contain"/></div>'
    + '<div style="padding-top:0.5rem;margin-bottom:1rem">'
    +   '<h1>New meeting poll</h1>'
    +   '<p style="margin-top:4px">Set up your poll and send invites.</p>'
    + '</div>'

    + '<div class="card">'
    +   '<h3>Meeting details</h3>'
    +   '<div class="label">Title *</div>'
    +   '<input type="text" placeholder="e.g. Team Sync" data-a="set-title" value="' + esc(p.title) + '" style="margin-bottom:10px"/>'
    +   '<div class="label">Description (optional)</div>'
    +   '<input type="text" placeholder="Any context for attendees..." data-a="set-desc" value="' + esc(p.description) + '"/>'
    + '</div>'

    + '<div class="card">'
    +   '<h3>Date options *</h3>'
    +   datesHtml
    +   '<div class="row">'
    +     '<input type="date" data-a="set-date" value="' + esc(S.newDateInput) + '" style="flex:1"/>'
    +     '<button class="sm" data-a="add-date">+ Add</button>'
    +   '</div>'
    + '</div>'

    + '<div class="card">'
    +   '<h3>Time slots</h3>'
    +   p.times.map(function(t, i) {
          return '<div class="row"><span style="flex:1;font-size:14px">' + esc(t) + '</span>'
            + (p.times.length > 1 ? '<button class="danger" data-a="rm-time" data-i="' + i + '">Remove</button>' : '')
            + '</div>';
        }).join('')
    +   '<button class="sm" data-a="add-time" style="margin-top:4px">+ Add time slot</button>'
    + '</div>'

    + '<div class="card">'
    +   '<h3>Invitees *</h3>'
    +   '<p style="margin-bottom:10px">Each person gets a unique personal link.</p>'
    +   invHtml
    +   '<button class="sm" data-a="add-inv" style="margin-top:4px">+ Add person</button>'
    + '</div>'

    + (S.error ? '<div class="error-box">' + esc(S.error) + '</div>' : '')
    + '<button class="primary full-btn" data-a="create" ' + ((!canCreate || S.loading) ? 'disabled' : '') + '>'
    +   (S.loading ? '<span class="spinner"></span>Sending invites...' : 'Create poll &amp; send invites &rarr;')
    + '</button>';
}

function resultsView() {
  var r = S.results;
  if (!r || !r.poll) return '<div class="card"><p>Loading...</p></div>';

  var poll = r.poll;
  var responses = Array.isArray(r.responses) ? r.responses : [];
  var invitees = Array.isArray(r.invitees) ? r.invitees : [];
  var total = responses.length;

  var scores = {};
  poll.dates.forEach(function(d) {
    poll.times.forEach(function(t) {
      scores[d + '__' + t] = 0;
    });
  });

  responses.forEach(function(resp) {
    var sel = resp && resp.selections ? resp.selections : {};
    Object.keys(sel).forEach(function(k) {
      if (sel[k]) scores[k] = (scores[k] || 0) + 1;
    });
  });

  var maxScore = Math.max.apply(null, Object.values(scores).concat([1]));

  var resultsHtml = '<div class="results-grid">'
    + poll.dates.map(function(d) {
        var slots = poll.times.map(function(t) {
          var k = d + '__' + t;
          var count = scores[k] || 0;
          var pct = total > 0 ? Math.round(count / total * 100) : 0;
          var best = count === maxScore && count > 0;

          return '<div class="result-slot-row' + (best ? ' best' : '') + '">'
            + '<span class="result-slot-label">' + esc(t) + (best ? '<span class="best-tag">BEST</span>' : '') + '</span>'
            + '<div class="result-bar-wrap"><div class="result-bar"><div class="result-bar-fill" style="width:' + pct + '%"></div></div></div>'
            + '<span class="result-slot-count">' + count + '/' + total + '</span>'
            + '</div>';
        }).join('');

        return '<div class="result-date-block">'
          + '<div class="result-date-header">' + esc(fmtDateLong(d)) + '</div>'
          + slots
          + '</div>';
      }).join('')
    + '</div>';

  var respondedEmails = new Set(
    responses
      .map(function(resp) { return normalizeEmail(resp.email); })
      .filter(Boolean)
  );

  var pending = invitees.filter(function(i) {
    return !respondedEmails.has(normalizeEmail(i.email));
  });

  var respondedHtml = responses.length === 0
    ? '<p>No responses yet.</p>'
    : responses.map(function(resp) {
        var c = avatarColor(resp.name);
        var selections = resp && resp.selections ? resp.selections : {};
        var slots = Object.values(selections).filter(Boolean).length;

        return '<div class="person-row">'
          + '<div class="avatar" style="background:' + esc(c[0]) + ';color:' + esc(c[1]) + '">' + esc(initials(resp.name)) + '</div>'
          + '<div class="person-info"><div class="person-name">' + esc(resp.name) + '</div>'
          + (resp.email ? '<div class="person-email">' + esc(resp.email) + '</div>' : '')
          + '</div>'
          + '<span class="person-slots">' + slots + ' slot' + (slots !== 1 ? 's' : '') + '</span></div>';
      }).join('');

  var pendingHtml = pending.length > 0
    ? '<div style="margin-top:10px"><div class="section-title">Awaiting (' + pending.length + ')</div>'
      + pending.map(function(i) {
          var line = (i.name ? esc(i.name) + ' &mdash; ' : '') + esc(i.email);
          return '<div style="font-size:13px;color:#888;padding:3px 0">' + line + '</div>';
        }).join('')
      + '</div>'
    : '';

  var addInvHtml = '';
  if (S.showAddInvitees) {
    var ni = S.newInvitees;
    addInvHtml = '<div class="add-inv-panel">'
      + '<div class="section-title" style="margin-bottom:8px">Add new invitees</div>'
      + ni.map(function(inv, i) {
          return '<div class="inv-row">'
            + '<input type="text" placeholder="Name" value="' + esc(inv.name) + '" data-a="ni-name" data-i="' + i + '"/>'
            + '<input type="email" placeholder="Email" value="' + esc(inv.email) + '" data-a="ni-email" data-i="' + i + '"/>'
            + (ni.length > 1 ? '<button class="danger" data-a="rm-ni" data-i="' + i + '">×</button>' : '')
            + '</div>';
        }).join('')
      + '<div class="row" style="margin-top:8px">'
      + '<button class="sm" data-a="add-ni">+ Add another</button>'
      + '<button class="sm primary" data-a="send-ni" ' + (S.loading ? 'disabled' : '') + '>'
      + (S.loading ? '<span class="spinner"></span>' : '') + 'Send invites</button>'
      + '</div>'
      + (S.error ? '<div class="error-box" style="margin-top:8px">' + esc(S.error) + '</div>' : '')
      + '</div>';
  }

  return ''
    + '<div style="text-align:center;padding:0.75rem 0 0.5rem"><img src="CaptainLarry.jpg" alt="Logo" style="max-height:70px;max-width:180px;object-fit:contain"/></div>'
    + '<div style="padding-top:0.25rem;margin-bottom:1rem;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">'
    +   '<div style="flex:1"><h1>' + esc(poll.title) + '</h1>' + (poll.description ? '<p style="margin-top:2px">' + esc(poll.description) + '</p>' : '') + '</div>'
    +   '<span class="badge badge-green">' + total + ' response' + (total !== 1 ? 's' : '') + '</span></div>'

    + '<div class="card">'
    +   '<h3>Availability summary</h3>'
    +   (total === 0 ? '<p>No responses yet. Waiting on invitees.</p>' : resultsHtml)
    + '</div>'

    + '<div class="card">'
    +   '<h3>Responses</h3>'
    +   respondedHtml
    +   pendingHtml
    +   '<div class="divider"></div>'
    +   '<button class="sm" data-a="toggle-add-inv">' + (S.showAddInvitees ? 'Cancel' : '+ Add more invitees') + '</button>'
    +   addInvHtml
    + '</div>'

    + '<div style="display:flex;gap:8px;margin-top:0.5rem;flex-wrap:wrap">'
    +   '<button class="sm" data-a="refresh" ' + (S.loading ? 'disabled' : '') + '>'
    +   (S.loading ? '<span class="spinner"></span>' : '') + 'Refresh</button>'
    +   '<button class="sm" data-a="new-poll" style="margin-left:auto">New poll</button>'
    + '</div>';
}

function respondView() {
  var poll = S.poll;
  if (!poll) {
    return '<div style="padding-top:2rem;text-align:center"><p>'
      + esc(S.loading ? 'Loading your invite...' : 'Could not load poll. Check your link.')
      + '</p></div>';
  }

  var gridHtml = '<div class="avail-grid">'
    + poll.dates.map(function(d) {
        var slots = poll.times.map(function(t) {
          var k = d + '__' + t;
          var checked = !!S.selections[k];

          return '<div class="time-slot-row' + (checked ? ' checked' : '') + '" data-a="toggle" data-key="' + esc(k) + '">'
            + '<span class="slot-label">' + esc(t) + '</span>'
            + '<div class="slot-check' + (checked ? ' checked' : '') + '">' + (checked ? '&#10003;' : '') + '</div>'
            + '</div>';
        }).join('');

        return '<div class="date-block">'
          + '<div class="date-header">' + esc(fmtDateLong(d)) + '</div>'
          + '<div class="time-slots">' + slots + '</div>'
          + '</div>';
      }).join('')
    + '</div>';

  return ''
    + '<div style="text-align:center;padding:0.75rem 0 0.5rem"><img src="CaptainLarry.jpg" alt="Logo" style="max-height:70px;max-width:180px;object-fit:contain"/></div>'
    + '<div style="padding-top:0.5rem;margin-bottom:1rem">'
    +   '<h1>' + esc(poll.title) + '</h1>'
    +   (poll.description ? '<p style="margin-top:4px">' + esc(poll.description) + '</p>' : '')
    +   '<p style="margin-top:6px;color:#888">Tap the times when you are available.</p></div>'

    + '<div class="card">'
    +   '<h3>Your name</h3>'
    +   '<input type="text" placeholder="Your name" value="' + esc(S.respondName) + '" data-a="set-name" style="margin-bottom:10px"/>'
    +   '<h3>Email (optional)</h3>'
    +   '<input type="email" placeholder="you@email.com" value="' + esc(S.respondEmail) + '" data-a="set-resp-email"/>'
    + '</div>'

    + '<div class="card">'
    +   '<h3>When are you available?</h3>'
    +   '<p style="margin-bottom:12px;font-size:13px">Tap each time slot you can make.</p>'
    +   gridHtml
    + '</div>'

    + (S.error ? '<div class="error-box">' + esc(S.error) + '</div>' : '')
    + '<button class="primary full-btn" data-a="submit-resp" ' + (!S.respondName.trim() || S.loading ? 'disabled' : '') + '>'
    +   (S.loading ? '<span class="spinner"></span>Submitting...' : 'Submit availability &rarr;')
    + '</button>';
}

function submittedView() {
  return ''
    + '<div style="padding-top:3rem;text-align:center;max-width:340px;margin:0 auto;padding-bottom:2rem">'
    +   '<div style="font-size:48px;margin-bottom:16px">&#10003;</div>'
    +   '<h1>Thanks, ' + esc(S.respondName) + '!</h1>'
    +   '<p style="margin-top:10px">Your availability has been saved. The organizer will be in touch once they find the best time.</p>'
    + '</div>';
}

function syncInputs() {
  document.querySelectorAll('[data-a]').forEach(function(el) {
    if (el.tagName !== 'INPUT') return;

    var a = el.dataset.a;
    var val = el.value;
    var idx = parseInt(el.dataset.i, 10);
    var p = S.newPoll;
    var ni = S.newInvitees;

    if (a === 'set-title') S.newPoll = Object.assign({}, p, { title: val });
    else if (a === 'set-desc') S.newPoll = Object.assign({}, p, { description: val });
    else if (a === 'set-date') S.newDateInput = val;
    else if (a === 'inv-name') {
      var inv1 = [].concat(p.invitees);
      inv1[idx] = Object.assign({}, inv1[idx], { name: val });
      S.newPoll = Object.assign({}, p, { invitees: inv1 });
    }
    else if (a === 'inv-email') {
      var inv2 = [].concat(p.invitees);
      inv2[idx] = Object.assign({}, inv2[idx], { email: val });
      S.newPoll = Object.assign({}, p, { invitees: inv2 });
    }
    else if (a === 'ni-name') {
      var n1 = [].concat(ni);
      n1[idx] = Object.assign({}, n1[idx], { name: val });
      S.newInvitees = n1;
    }
    else if (a === 'ni-email') {
      var n2 = [].concat(ni);
      n2[idx] = Object.assign({}, n2[idx], { email: val });
      S.newInvitees = n2;
    }
    else if (a === 'set-name') S.respondName = val;
    else if (a === 'set-resp-email') S.respondEmail = val;
  });
}

async function handle(e) {
  var target = e.currentTarget;
  var a = target.dataset.a;
  var idx = parseInt(target.dataset.i, 10);
  var val = target.value;
  var p = S.newPoll;

  if (e.type === 'blur') {
    if (a === 'set-title') S.newPoll = Object.assign({}, p, { title: val });
    else if (a === 'set-desc') S.newPoll = Object.assign({}, p, { description: val });
    else if (a === 'inv-name') {
      var inv1 = [].concat(p.invitees);
      inv1[idx] = Object.assign({}, inv1[idx], { name: val });
      S.newPoll = Object.assign({}, p, { invitees: inv1 });
    }
    else if (a === 'inv-email') {
      var inv2 = [].concat(p.invitees);
      inv2[idx] = Object.assign({}, inv2[idx], { email: val });
      S.newPoll = Object.assign({}, p, { invitees: inv2 });
    }
    else if (a === 'ni-name') {
      var n1 = [].concat(S.newInvitees);
      n1[idx] = Object.assign({}, n1[idx], { name: val });
      S.newInvitees = n1;
    }
    else if (a === 'ni-email') {
      var n2 = [].concat(S.newInvitees);
      n2[idx] = Object.assign({}, n2[idx], { email: val });
      S.newInvitees = n2;
    }
    else if (a === 'set-name') S.respondName = val;
    else if (a === 'set-resp-email') S.respondEmail = val;
    return;
  }

  if (a === 'login') {
    var pw = document.getElementById('pw-input') ? document.getElementById('pw-input').value : S.pw;
    if (!pw.trim()) {
      set({ error: 'Please enter a password.' });
      return;
    }

    set({ loading: true, error: null });

    try {
      var loginRes = await apiPost({ action: 'login', pw: pw });
      if (loginRes && loginRes.token) {
        set({
          loading: false,
          view: 'host',
          error: null,
          sessionToken: loginRes.token,
          pw: ''
        });
      } else {
        set({
          loading: false,
          error: (loginRes && loginRes.error) ? loginRes.error : 'Incorrect password. Please try again.'
        });
      }
    } catch (err) {
      set({ loading: false, error: 'Could not reach server. Please try again.' });
    }
    return;
  }

  if (a === 'set-pw') {
    S.pw = val;
    return;
  }

  if (a === 'add-date') {
    syncInputs();
    var d = String(S.newDateInput || '').trim();
    if (!d) return;

    var nextDates = uniqueStrings(S.newPoll.dates.concat([d])).sort();
    set({
      newPoll: Object.assign({}, S.newPoll, { dates: nextDates }),
      newDateInput: ''
    });
    return;
  }

  if (a === 'rm-date') {
    set({
      newPoll: Object.assign({}, p, {
        dates: p.dates.filter(function(_, i) { return i !== idx; })
      })
    });
    return;
  }

  if (a === 'rm-time') {
    set({
      newPoll: Object.assign({}, p, {
        times: p.times.filter(function(_, i) { return i !== idx; })
      })
    });
    return;
  }

  if (a === 'add-time') {
    var label = prompt('Time slot label:');
    var clean = String(label || '').trim();
    if (!clean) return;

    if (S.newPoll.times.indexOf(clean) !== -1) {
      toast('That time slot already exists.');
      return;
    }

    set({
      newPoll: Object.assign({}, p, {
        times: p.times.concat([clean])
      })
    });
    return;
  }

  if (a === 'add-inv') {
    set({
      newPoll: Object.assign({}, p, {
        invitees: p.invitees.concat([{ name: '', email: '' }])
      })
    });
    return;
  }

  if (a === 'rm-inv') {
    set({
      newPoll: Object.assign({}, p, {
        invitees: p.invitees.filter(function(_, i) { return i !== idx; })
      })
    });
    return;
  }

  if (a === 'toggle') {
    var key = target.dataset.key;
    var sel = Object.assign({}, S.selections);
    sel[key] = !sel[key];
    set({ selections: sel });
    return;
  }

  if (a === 'toggle-add-inv') {
    set({ showAddInvitees: !S.showAddInvitees, error: null });
    return;
  }

  if (a === 'add-ni') {
    set({ newInvitees: S.newInvitees.concat([{ name: '', email: '' }]) });
    return;
  }

  if (a === 'rm-ni') {
    set({ newInvitees: S.newInvitees.filter(function(_, i) { return i !== idx; }) });
    return;
  }

  if (a === 'send-ni') {
    syncInputs();

    var validNewInvitees = dedupeInvitees(S.newInvitees);
    if (!validNewInvitees.length) {
      set({ error: 'Please enter at least one email.' });
      return;
    }

    var badNewInvitee = validNewInvitees.find(function(i) { return !isValidEmail(i.email); });
    if (badNewInvitee) {
      set({ error: 'Please enter valid email addresses.' });
      return;
    }

    set({ loading: true, error: null });

    try {
      var addRes = await apiPost({
        action: 'addInvitees',
        pollId: S.results.poll.pollId,
        invitees: validNewInvitees,
        sessionToken: S.sessionToken
      });

      if (addRes.error) throw new Error(addRes.error);

      var refreshedResults1 = await apiGet({ action: 'getResults', pollId: S.results.poll.pollId });

      set({
        loading: false,
        showAddInvitees: false,
        newInvitees: [{ name: '', email: '' }],
        results: refreshedResults1
      });

      toast(addRes.inviteeCount + ' invite(s) sent!');
    } catch (err) {
      set({ loading: false, error: 'Error: ' + err.message });
    }
    return;
  }

  if (a === 'refresh') {
    set({ loading: true, error: null });
    try {
      var refreshedResults2 = await apiGet({ action: 'getResults', pollId: S.results.poll.pollId });
      set({ loading: false, results: refreshedResults2 });
    } catch (err) {
      set({ loading: false, error: 'Refresh failed.' });
    }
    return;
  }

  if (a === 'new-poll') {
    set({
      view: 'host',
      results: null,
      showAddInvitees: false,
      newInvitees: [{ name: '', email: '' }],
      newDateInput: '',
      error: null,
      newPoll: resetNewPoll()
    });
    return;
  }

  if (a === 'create') {
    syncInputs();

    var np = S.newPoll;
    var cleanDates = uniqueStrings(np.dates).sort();
    var cleanTimes = uniqueStrings(np.times);
    var validInv = dedupeInvitees(np.invitees);

    if (!np.title.trim()) {
      set({ error: 'Please enter a poll title.' });
      return;
    }
    if (!cleanDates.length) {
      set({ error: 'Please add at least one date.' });
      return;
    }
    if (!cleanTimes.length) {
      set({ error: 'Please add at least one time slot.' });
      return;
    }
    if (!validInv.length) {
      set({ error: 'Please enter at least one invitee email.' });
      return;
    }
    if (validInv.some(function(i) { return !isValidEmail(i.email); })) {
      set({ error: 'Please enter valid invitee email addresses.' });
      return;
    }

    set({ loading: true, error: null });

    try {
      var createRes = await apiPost({
        action: 'createPoll',
        title: np.title.trim(),
        description: String(np.description || '').trim(),
        dates: cleanDates,
        times: cleanTimes,
        invitees: validInv,
        sessionToken: S.sessionToken
      });

      if (createRes.error) throw new Error(createRes.error);

      var createdResults = await apiGet({ action: 'getResults', pollId: createRes.pollId });

      set({
        loading: false,
        view: 'results',
        results: createdResults,
        newPoll: resetNewPoll(),
        newDateInput: '',
        error: null
      });

      toast('Poll created! ' + createRes.inviteeCount + ' invite(s) sent.');
    } catch (err) {
      set({ loading: false, error: 'Error: ' + err.message });
    }
    return;
  }

  if (a === 'submit-resp') {
    syncInputs();

    if (!S.respondName.trim()) {
      set({ error: 'Please enter your name.' });
      return;
    }

    if (S.respondEmail.trim() && !isValidEmail(S.respondEmail)) {
      set({ error: 'Please enter a valid email address.' });
      return;
    }

    set({ loading: true, error: null });

    try {
      var submitRes = await apiPost({
        action: 'submitResponse',
        pollId: S.poll.pollId,
        token: S.inviteeToken,
        name: S.respondName.trim(),
        email: S.respondEmail.trim(),
        selections: S.selections
      });

      if (submitRes && submitRes.error) throw new Error(submitRes.error);

      set({ loading: false, view: 'submitted' });
    } catch (err) {
      set({
        loading: false,
        error: 'We could not confirm that your response was saved. Please try again.'
      });
    }
    return;
  }
}

(async function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');

  if (token) {
    S.view = 'respond';
    S.inviteeToken = token;
    S.loading = true;
    render();

    try {
      var inv = await apiGet({ action: 'getInvitee', token: token });
      if (inv && inv.error) throw new Error(inv.error);

      var poll = await apiGet({ action: 'getPoll', pollId: inv.pollId });
      if (poll && poll.error) throw new Error(poll.error);

      S.respondName = inv.name || '';
      S.respondEmail = inv.email || '';
      S.poll = poll;
      S.loading = false;
      S.error = null;
    } catch (err) {
      S.loading = false;
      S.error = 'Unable to load poll. Please check your internet connection and try again, or contact the organizer.';
    }

    render();
    return;
  }

  S.view = 'login';
  render();
})();
</script>
